name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Tests
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check backend/

      - name: Mypy
        run: mypy -p app

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: incident_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/incident_platform_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-for-production
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=backend/app --cov-report=term-missing --cov-fail-under=70

  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    env:
      AWS_REGION: us-east-1
      IMAGE_TAG: sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set ECR registry
        run: echo "ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}" >> $GITHUB_ENV

      # ── Build & push backend ────────────────────────────────────────────────
      - name: Build backend image
        run: |
          docker build \
            -t $ECR_REGISTRY/incident-platform/backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/incident-platform/backend:latest \
            .

      - name: Push backend image
        run: |
          docker push $ECR_REGISTRY/incident-platform/backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/incident-platform/backend:latest

      # ── Build & push frontend ───────────────────────────────────────────────
      - name: Build frontend image
        run: |
          docker build \
            -t $ECR_REGISTRY/incident-platform/frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/incident-platform/frontend:latest \
            ./frontend

      - name: Push frontend image
        run: |
          docker push $ECR_REGISTRY/incident-platform/frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/incident-platform/frontend:latest

      # ── Deploy backend ──────────────────────────────────────────────────────
      - name: Download backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition incident-platform-backend \
            --query taskDefinition \
            > backend-task-def.json

      - name: Update backend image in task definition
        id: backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def.json
          container-name: backend
          image: ${{ env.ECR_REGISTRY }}/incident-platform/backend:${{ env.IMAGE_TAG }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.backend-task-def.outputs.task-definition }}
          service: incident-platform-backend
          cluster: incident-platform
          wait-for-service-stability: true

      # ── Deploy frontend ─────────────────────────────────────────────────────
      - name: Download frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition incident-platform-frontend \
            --query taskDefinition \
            > frontend-task-def.json

      - name: Update frontend image in task definition
        id: frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-def.json
          container-name: frontend
          image: ${{ env.ECR_REGISTRY }}/incident-platform/frontend:${{ env.IMAGE_TAG }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.frontend-task-def.outputs.task-definition }}
          service: incident-platform-frontend
          cluster: incident-platform
          wait-for-service-stability: true
