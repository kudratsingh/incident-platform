server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for all unmatched routes
    # In production (ECS), /api/* is routed to the backend by the ALB before
    # it ever reaches this container, so no proxy_pass block is needed here.
    # In local docker-compose, the Vite dev server handles the proxy instead.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite fingerprints them)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
